<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ukraine pre-rendered fly-over background — static city images + scroll-driven pan/zoom/crossfade (static-when-idle)</title>
<meta name="description" content="Lightweight scroll-driven background: pre-rendered positron city images (Kyiv/Odesa/Kharkiv/Dnipro) animated by GPU-cheap CSS transform/opacity, with the live canvas traffic sim ported over and paused-on-idle. Drop-in replacement for map-bg.html." />
<style>
:root{
  --pastel-sky:oklch(93% .04 220);
  --pastel-mint:oklch(92% .06 160);
  --pastel-sage:oklch(85% .08 145);
  --pastel-cream:oklch(96% .03 95);
  --map-land:#f3f6ee;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--map-land)}
body{
  font-family:Manrope,Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  -webkit-font-smoothing:antialiased;
}
/* Full-bleed stage. Every layer is a fixed REF_W×REF_H box centred in the viewport and scaled to
   COVER it (object-fit:cover semantics done by hand, so the SAME transform also drives the traffic
   canvas → cars stay glued to the streets). Edges crop; fine for a decorative background. */
.stage{position:fixed;inset:0;overflow:hidden;isolation:isolate;background:var(--map-land);z-index:0}
.layer{
  position:absolute;left:50%;top:50%;
  width:1280px;height:720px;margin-left:-640px;margin-top:-360px;
  transform-origin:center center;
  will-change:transform,opacity;
  backface-visibility:hidden;
  pointer-events:none;
}
.layer img{display:block;width:100%;height:100%;object-fit:cover}
#fill{z-index:0;background:var(--map-land);left:0;top:0;width:100%;height:100%;margin:0}
.l-country{z-index:1}
.l-wide{z-index:2}
.l-street{z-index:3}
#traffic{z-index:4}
/* Calm positron overlays — STATIC gradients (no per-frame work), matching the live map's tint/veil/
   focus-softener so the look behind the page glass is identical. */
.tint,.veil,.focus{position:absolute;inset:0;pointer-events:none}
.tint{z-index:5;background:color-mix(in oklab, var(--pastel-sage) 18%, transparent);mix-blend-mode:multiply}
.veil{z-index:6;background:radial-gradient(ellipse at center, transparent 55%, color-mix(in oklab, var(--pastel-mint) 45%, transparent) 100%)}
.focus{z-index:7;opacity:.18;background:radial-gradient(ellipse at 50% 48%, transparent 0%, transparent 48%, color-mix(in oklab, var(--pastel-mint) 20%, transparent) 68%, color-mix(in oklab, var(--pastel-mint) 48%, transparent) 100%)}
@media(max-width:760px){ .tint{opacity:.62} .veil{opacity:.30} .focus{opacity:.22} }
#hud{position:absolute;left:8px;top:8px;z-index:20;font:11px/1.4 ui-monospace,Menlo,monospace;color:#234;background:rgba(255,255,255,.7);padding:6px 8px;border-radius:8px;display:none;white-space:pre}
</style>
</head>
<body>
<div class="stage" id="stage" aria-hidden="true">
  <div id="fill" class="layer"></div>
  <div class="layer l-country" id="lcountry"><img id="imgCountry" alt="" decoding="async" /></div>
  <!-- city wide + street layers (one per city; only the active city's are visible) -->
  <div class="layer l-wide"   data-city="kyiv"><img alt="" decoding="async"></div>
  <div class="layer l-wide"   data-city="odesa"><img alt="" decoding="async"></div>
  <div class="layer l-wide"   data-city="kharkiv"><img alt="" decoding="async"></div>
  <div class="layer l-wide"   data-city="dnipro"><img alt="" decoding="async"></div>
  <div class="layer l-street" data-city="kyiv"><img alt="" decoding="async"></div>
  <div class="layer l-street" data-city="odesa"><img alt="" decoding="async"></div>
  <div class="layer l-street" data-city="kharkiv"><img alt="" decoding="async"></div>
  <div class="layer l-street" data-city="dnipro"><img alt="" decoding="async"></div>
  <canvas class="layer" id="traffic" width="1280" height="720"></canvas>
  <div class="tint"></div><div class="veil"></div><div class="focus"></div>
  <div id="hud"></div>
</div>
<script>
(function(){
  'use strict';
  /* ====================================================================================
     PRE-RENDERED FLY-OVER BACKGROUND
     Replaces the live MapLibre map (map-bg.html) with static pre-rendered positron city
     images. Reads the SAME window.__journeyProgress signal the host writes, reuses the live
     map's exact `stops` + targetFromProgress() journey, and maps it to GPU-cheap CSS
     transform/opacity crossfades. The live canvas traffic sim is ported over VERBATIM
     (movement logic unchanged) and runs on a pure Web-Mercator project() over the frozen
     per-city camera. STATIC-WHEN-IDLE: nothing repaints unless the host is writing progress.
  ==================================================================================== */
  var REF_W=1280, REF_H=720;
  var DBG=/[?&]dbg/.test(location.search);
  var hud=document.getElementById('hud'); if(DBG) hud.style.display='block';

  // ---- device profile (mirrors map-bg's mobileLike / lowPowerDevice) ----
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var lowPowerDevice=(function(){try{
    if(typeof navigator.deviceMemory==='number'&&navigator.deviceMemory>0&&navigator.deviceMemory<4)return true;
    if(typeof navigator.hardwareConcurrency==='number'&&navigator.hardwareConcurrency>0&&navigator.hardwareConcurrency<4)return true;
  }catch(e){}return false;})();
  var mobileLike = matchMedia('(max-width:1024px)').matches || matchMedia('(pointer:coarse)').matches || lowPowerDevice;

  // ---- shared math ----
  var clamp=function(v,a,b){return Math.max(a,Math.min(b,v));};
  var lerp=function(a,b,t){return a+(b-a)*t;};
  var ssJourney=function(t){return t*t*t*(t*(t*6-15)+10);};            // single-arg (journey)
  function smoothstep(edge0,edge1,x){var t=clamp((x-edge0)/Math.max(.0001,edge1-edge0),0,1);return t*t*(3-2*t);}

  var cities={
    kyiv:{lat:50.44765,lng:30.52295},
    odesa:{lat:46.48535,lng:30.73820},
    kharkiv:{lat:50.00465,lng:36.23215},
    dnipro:{lat:48.46490,lng:35.04690}
  };
  var ORDER=['kyiv','odesa','kharkiv','dnipro'];

  // ---- journey keyframes — COPIED VERBATIM from map-bg.html (the camera cinematography) ----
  var stops=[
    [0.000,48.62,31.20,8.60],[0.060,48.62,31.20,9.00],
    [0.140,cities.kyiv.lat,cities.kyiv.lng,9.60],[0.230,cities.kyiv.lat,cities.kyiv.lng,11.60],
    [0.320,cities.kyiv.lat,cities.kyiv.lng,13.60],[0.410,cities.kyiv.lat,cities.kyiv.lng,15.35],
    [0.500,cities.kyiv.lat,cities.kyiv.lng,15.35],[0.560,cities.kyiv.lat,cities.kyiv.lng,10.00],
    [0.640,48.55,30.62,9.20],[0.710,cities.odesa.lat,cities.odesa.lng,9.60],
    [0.800,cities.odesa.lat,cities.odesa.lng,11.60],[0.890,cities.odesa.lat,cities.odesa.lng,13.60],
    [0.980,cities.odesa.lat,cities.odesa.lng,15.30],[1.070,cities.odesa.lat,cities.odesa.lng,15.30],
    [1.130,cities.odesa.lat,cities.odesa.lng,10.00],[1.220,48.20,33.50,9.00],
    [1.290,cities.kharkiv.lat,cities.kharkiv.lng,9.60],[1.380,cities.kharkiv.lat,cities.kharkiv.lng,11.60],
    [1.470,cities.kharkiv.lat,cities.kharkiv.lng,13.60],[1.560,cities.kharkiv.lat,cities.kharkiv.lng,15.25],
    [1.650,cities.kharkiv.lat,cities.kharkiv.lng,15.25],[1.710,cities.kharkiv.lat,cities.kharkiv.lng,10.00],
    [1.780,49.22,35.62,9.80],[1.850,cities.dnipro.lat,cities.dnipro.lng,9.80],
    [1.930,cities.dnipro.lat,cities.dnipro.lng,11.60],[2.010,cities.dnipro.lat,cities.dnipro.lng,13.60],
    [2.090,cities.dnipro.lat,cities.dnipro.lng,15.35],[2.170,cities.dnipro.lat,cities.dnipro.lng,15.35]
  ].map(function(s){return {p:s[0],lat:s[1],lng:s[2],zoom:s[3]};});
  var routeEnd=stops[stops.length-1].p;
  function targetFromProgress(progress){
    var p=progress*routeEnd, idx=0;
    while(idx<stops.length-2 && p>stops[idx+1].p) idx++;
    var a=stops[idx], b=stops[idx+1];
    var local=ssJourney(clamp((p-a.p)/Math.max(.0001,b.p-a.p),0,1));
    return {lat:lerp(a.lat,b.lat,local),lng:lerp(a.lng,b.lng,local),zoom:lerp(a.zoom,b.zoom,local),routeP:p};
  }
  function cityDistance(a,b){var x=(a.lng-b.lng)*Math.cos(((a.lat+b.lat)*.5)*Math.PI/180);var y=a.lat-b.lat;return Math.hypot(x,y);}
  function activeCityOf(lat,lng){var bid=ORDER[0],bd=Infinity;for(var i=0;i<ORDER.length;i++){var d=cityDistance({lat:lat,lng:lng},cities[ORDER[i]]);if(d<bd){bd=d;bid=ORDER[i];}}return [bid,bd];}

  // ============================ TRAFFIC SIM (ported VERBATIM from map-bg) ============================
  // The car MOVEMENT / draw logic below is unchanged from the live map; only the environment differs:
  //   • `map.project` is a pure Web-Mercator projection over the frozen per-city camera (no WebGL).
  //   • the road network is pre-built (captured from the live map) and loaded as JSON.
  //   • `camera` is frozen at the captured city street camera.
  var PRODUCTION_PROFILE={fpsBudgetGuard:{excellent:18,good:22,fair:28,poor:34,bad:42},mobileBudgetScale:.78,desktopBudgetScale:1};
  var TRAFFIC={smoothFrameMs:16,realFrameMs:16,lastRoadQuery:0,stats:{drawn:0,cars:0,lanes:0,mode:'none'},palette:['#2f9e44','#1c7ed6','#f08c00','#e8590c','#12b886','#7950f2','#d6336c','#0b7285']};
  var camera={lat:0,lng:0,zoom:15};
  function cityTrafficMultiplier(){return 1;}

  // pure project(): MapLibre Web-Mercator (tileSize 512, pixelRatio 1, no pitch/bearing).
  var _proj={cx:0,cy:0,ws:1,w:REF_W,h:REF_H};
  function buildProject(cam,w,h){
    var ws=512*Math.pow(2,cam.zoom);
    function lngX(lng){return (lng+180)/360*ws;}
    function latY(lat){var s=Math.sin(lat*Math.PI/180);return (0.5 - Math.log((1+s)/(1-s))/(4*Math.PI))*ws;}
    _proj={cx:lngX(cam.lng),cy:latY(cam.lat),ws:ws,w:w,h:h,lngX:lngX,latY:latY};
  }
  var map={project:function(ll){return {x:_proj.lngX(ll[0])-_proj.cx+_proj.w/2, y:_proj.latY(ll[1])-_proj.cy+_proj.h/2};}};

  function smoothstep3(edge0,edge1,x){return smoothstep(edge0,edge1,x);} // alias guard
  function lodBlend(zoom){
    var dotOut=1-smoothstep(13.15,13.85,zoom);
    var capsuleIn=smoothstep(13.15,13.85,zoom);
    var capsuleOut=1-smoothstep(14.25,14.75,zoom);
    var carIn=smoothstep(14.25,14.75,zoom);
    return {dot:dotOut,capsule:capsuleIn*capsuleOut,car:carIn};
  }
  function laneSample(lane,distance){
    var d=((distance%lane.length)+lane.length)%lane.length;
    var idx=1; while(idx<lane.cumulative.length && lane.cumulative[idx]<d) idx++;
    var i1=Math.min(idx,lane.points.length-1), i0=Math.max(0,i1-1);
    var segLen=Math.max(.0001,lane.cumulative[i1]-lane.cumulative[i0]);
    var t=clamp((d-lane.cumulative[i0])/segLen,0,1);
    var a=lane.points[i0], b=lane.points[i1];
    var lng=lerp(a.lng,b.lng,t), lat=lerp(a.lat,b.lat,t);
    var aPx=map.project([a.lng,a.lat]), bPx=map.project([b.lng,b.lat]);
    var x=lerp(aPx.x,bPx.x,t), y=lerp(aPx.y,bPx.y,t);
    var dx=bPx.x-aPx.x, dy=bPx.y-aPx.y, screenLen=Math.hypot(dx,dy)||1;
    return {lng:lng,lat:lat,x:x,y:y,dx:dx/screenLen,dy:dy/screenLen,vertexIndex:i1};
  }
  function trafficOpacity(zoom,network){
    if(!network)return 0;
    if(zoom<6.4)return 0;
    if(zoom<8.5)return (zoom-6.4)/2.1*.26;
    if(zoom<11.0)return .26+(zoom-8.5)/2.5*.18;
    if(zoom<13.0)return .44+(zoom-11.0)/2.0*.14;
    if(zoom<14.4)return .58+(zoom-13.0)/1.4*.10;
    return .68;
  }
  function trafficVisibleDensity(zoom){
    if(zoom<6.9)return 0;
    if(zoom<8.8)return smoothstep(6.9,8.8,zoom)*.30;
    if(zoom<10.4)return .30+smoothstep(8.8,10.4,zoom)*.28;
    if(zoom<12.8)return .58+smoothstep(10.4,12.8,zoom)*.24;
    if(zoom<13.8)return .82+smoothstep(12.8,13.8,zoom)*.12;
    if(zoom<14.75)return .94+smoothstep(13.8,14.75,zoom)*.06;
    return 1.0;
  }
  function trafficMinimumCarFade(zoom){
    if(zoom<9.4)return 0;
    if(zoom<11.8)return smoothstep(9.4,11.8,zoom)*.095;
    if(zoom<13.2)return .095+smoothstep(11.8,13.2,zoom)*.085;
    if(zoom<14.5)return .180+smoothstep(13.2,14.5,zoom)*.080;
    return .26;
  }
  function trafficRenderBudget(zoom){
    var mb=56+smoothstep(8.4,11.4,zoom)*68+smoothstep(11.4,13.2,zoom)*84+smoothstep(13.2,14.75,zoom)*60;
    var db=100+smoothstep(8.4,11.4,zoom)*136+smoothstep(11.4,13.2,zoom)*156+smoothstep(13.2,14.75,zoom)*104;
    return Math.max(mobileLike?14:24,Math.round((mobileLike?mb:db)*trafficAdaptiveBudgetScale()));
  }
  function stableUnit(value){var x=Math.sin((value||1)*12.9898)*43758.5453123;return x-Math.floor(x);}
  function carDensityFade(car,density){
    if(camera.zoom>=12.85)return 1;
    var reveal=stableUnit((car.seed||1)*91.7+(car.laneIndex||0)*.37);
    return smoothstep(reveal-.42,reveal+.18,density);
  }
  function carSpawnFade(car){
    if(!car||!car.bornAt)return 1;
    var elapsed=performance.now()-car.bornAt-(car.spawnDelay||0);
    if(elapsed<=0)return 0;
    return smoothstep(0,car.spawnDuration||1000,elapsed);
  }
  function carBudgetFade(car,budget,total){
    if(camera.zoom>=12.85)return 1;
    if(!total||budget>=total)return 1;
    var ratio=clamp(budget/Math.max(1,total),0,1);
    var reveal=stableUnit((car.seed||1)*43.91+(car.laneIndex||0)*.13);
    return smoothstep(reveal-.14,reveal+.20,ratio);
  }
  function smoothCarAlpha(car,targetAlpha){
    var current=isFinite(car.visualAlpha)?car.visualAlpha:0;
    var frameMs=TRAFFIC.smoothFrameMs||16.7;
    var base=targetAlpha>current?.075:.115;
    var k=1-Math.pow(1-base,frameMs/16.7);
    car.visualAlpha=current+(targetAlpha-current)*clamp(k,.035,.24);
    if(car.visualAlpha<.001&&targetAlpha<=.001)car.visualAlpha=0;
    if(car.visualAlpha>.995&&targetAlpha>=.995)car.visualAlpha=1;
    return car.visualAlpha;
  }
  function trafficVisualMode(zoom){
    if(zoom<13.15)return 'dots'; if(zoom<13.85)return 'dots→capsules';
    if(zoom<14.25)return 'capsules'; if(zoom<14.75)return 'capsules→cars'; return 'cars';
  }
  function trafficZoomScale(zoom){
    if(zoom<9.0)return .56; if(zoom<10.8)return .64; if(zoom<12.7)return .76; if(zoom<14.15)return .92; return 1.08;
  }
  function trafficZoomAlphaMultiplier(zoom){
    if(zoom<10.2)return .48; if(zoom<11.8)return .58; if(zoom<12.7)return .68; if(zoom<13.8)return .84; return 1;
  }
  function cityLabelFadeFactor(){return 1;}
  function laneOffsetPixels(zoom){
    if(zoom<9.5)return .28; if(zoom<11.5)return .62; if(zoom<13.5)return 1.24; return 2.15;
  }
  function turnSignalFromTurn(turn){if(Math.abs(turn)<.32)return null;return turn>0?'right':'left';}
  function chooseNextLane(lane,car){
    if(!lane||!lane.connections||!lane.connections.length)return null;
    var options=lane.connections, r=Math.random(), pool;
    if(r<.60){pool=options.slice(0,Math.min(2,options.length));}
    else if(r<.86){pool=options.filter(function(o){return Math.abs(o.turn)>.28&&Math.abs(o.turn)<1.72;});if(!pool.length)pool=options;}
    else{pool=options;}
    var choice=pool[Math.floor(Math.random()*pool.length)]||options[0];
    return choice||null;
  }
  function updateTrafficCars(network,dt){
    if(!network)return;
    var laneGroups=new Map();
    for(var ci=0;ci<network.cars.length;ci++){var car=network.cars[ci];if(!laneGroups.has(car.laneIndex))laneGroups.set(car.laneIndex,[]);laneGroups.get(car.laneIndex).push(car);}
    laneGroups.forEach(function(cars,laneIndex){
      var lane=network.lanes[laneIndex]; if(!lane)return;
      cars.sort(function(a,b){return a.progress-b.progress;});
      for(var i=0;i<cars.length;i++){
        var car=cars[i]; var ahead=cars[(i+1)%cars.length];
        var gap=ahead.progress-car.progress; if(gap<=0)gap+=lane.length;
        var safeGap=lane.major?30:24;
        if(!isFinite(car.speed))car.speed=car.baseDesiredSpeed||car.desiredSpeed||6;
        if(!isFinite(car.progress))car.progress=0;
        car.desiredSpeed=car.baseDesiredSpeed||car.desiredSpeed||6;
        if(car.stopTimer>0){car.stopTimer=Math.max(0,car.stopTimer-dt);car.speed=Math.max(0,car.speed-20*dt);}
        else{car.speed+=(car.desiredSpeed-car.speed)*Math.min(1,dt*1.8);}
        if(gap<safeGap){car.speed=Math.min(car.speed,Math.max(0,ahead.speed-1.4));if(gap<safeGap*.70)car.speed=Math.max(0,car.speed-20*dt);}
        var distToEnd=lane.length-car.progress;
        if(distToEnd<42&&car.nextLaneIndex==null){
          var nc=chooseNextLane(lane,car);
          if(nc){car.nextLaneIndex=nc.index;var sig=turnSignalFromTurn(nc.turn);if(sig){car.turnSignal=sig;car.turnSignalUntil=performance.now()+1400;}}
        }
        var sample=laneSample(lane,car.progress);
        var vertexDist=lane.cumulative[sample.vertexIndex]||lane.length;
        var distToVertex=Math.abs(vertexDist-(car.progress%lane.length));
        var hasIntersection=lane.connections&&lane.connections.length>1;
        if(distToVertex<10&&hasIntersection&&car.stopBias<.13&&Math.random()<dt*.26){car.stopTimer=.16+car.stopBias*1.0;}
        car.braking=car.stopTimer>0||car.speed<car.desiredSpeed*.56;
        car.progress+=car.speed*dt;
        if(car.progress>=lane.length){
          var overflow=car.progress-lane.length;
          if(car.nextLaneIndex!=null&&network.lanes[car.nextLaneIndex]){car.laneIndex=car.nextLaneIndex;car.progress=overflow;car.nextLaneIndex=null;}
          else if(lane.connections&&lane.connections.length){
            var nc2=chooseNextLane(lane,car);
            if(nc2&&network.lanes[nc2.index]){car.laneIndex=nc2.index;car.progress=overflow;}
            else{car.progress=overflow%lane.length;}
          }else{car.progress=overflow%lane.length;}
        }
        if(car.turnSignalUntil&&performance.now()>car.turnSignalUntil){car.turnSignal=null;car.turnSignalUntil=0;}
      }
    });
  }
  function roundedRect(ctx,x,y,w,h,r){
    var rr=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+rr,y);ctx.lineTo(x+w-rr,y);ctx.quadraticCurveTo(x+w,y,x+w,y+rr);
    ctx.lineTo(x+w,y+h-rr);ctx.quadraticCurveTo(x+w,y+h,x+w-rr,y+h);ctx.lineTo(x+rr,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-rr);
    ctx.lineTo(x,y+rr);ctx.quadraticCurveTo(x,y,x+rr,y);ctx.closePath();
  }
  function hexToRgb(hex){var raw=String(hex||'').replace('#','').trim();var full=raw.length===3?raw.split('').map(function(c){return c+c;}).join(''):raw;var n=parseInt(full||'6fa487',16);return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};}
  function mixRgb(a,b,t){var k=clamp(t,0,1);return {r:Math.round(lerp(a.r,b.r,k)),g:Math.round(lerp(a.g,b.g,k)),b:Math.round(lerp(a.b,b.b,k))};}
  function rgbCss(rgb){return 'rgb('+rgb.r+','+rgb.g+','+rgb.b+')';}
  function trafficColorProgress(){return 1;}
  function trafficColorForZoom(car,zoom){var flow=car.flowRgb||{r:135,g:172,b:151};var body=car.colorRgb||hexToRgb(car.color);return mixRgb(flow,body,trafficColorProgress(zoom));}
  function drawTrafficCar(x,y,angle,car,opacity){
    var blend=lodBlend(camera.zoom);var scale=trafficZoomScale(camera.zoom);
    var len=car.length*scale, wid=car.width*scale;var bodyColor=rgbCss(trafficColorForZoom(car,camera.zoom));
    trafficCtx.save();trafficCtx.translate(x,y);trafficCtx.rotate(angle);
    if(blend.dot>.01){
      var radius=Math.max(1.05,wid*(camera.zoom<12.4?.24:.30));trafficCtx.globalAlpha=opacity*blend.dot;
      trafficCtx.fillStyle=bodyColor;trafficCtx.beginPath();trafficCtx.arc(0,0,radius,0,Math.PI*2);trafficCtx.fill();
      if(camera.zoom>=12.45){trafficCtx.globalAlpha=opacity*blend.dot*.28;trafficCtx.fillStyle='rgba(255,255,255,.42)';trafficCtx.beginPath();trafficCtx.arc(-radius*.28,-radius*.24,radius*.32,0,Math.PI*2);trafficCtx.fill();}
    }
    if(blend.capsule>.01){
      trafficCtx.globalAlpha=opacity*blend.capsule;
      trafficCtx.fillStyle='rgba(33,65,45,.075)';roundedRect(trafficCtx,-len*.35,-wid*.18+1.0,len*.70,wid*.38,1.3);trafficCtx.fill();
      trafficCtx.fillStyle=bodyColor;roundedRect(trafficCtx,-len*.44,-wid*.32,len*.88,wid*.64,Math.min(2.0,wid*.44));trafficCtx.fill();
      trafficCtx.globalAlpha=opacity*blend.capsule*.54;trafficCtx.fillStyle='rgba(255,255,255,.42)';roundedRect(trafficCtx,-len*.10,-wid*.22,len*.28,wid*.44,1.0);trafficCtx.fill();
      if(car.braking&&camera.zoom>=13.0){trafficCtx.globalAlpha=opacity*blend.capsule*.75;trafficCtx.fillStyle='rgba(210,88,88,.85)';trafficCtx.fillRect(len*.34,-wid*.16,1.0,wid*.12);trafficCtx.fillRect(len*.34,wid*.04,1.0,wid*.12);}
    }
    if(blend.car>.01){
      trafficCtx.globalAlpha=opacity*blend.car;
      trafficCtx.fillStyle='rgba(33,65,45,.12)';roundedRect(trafficCtx,-len*.45,-wid*.26+1.6,len*.90,wid*.56,1.8);trafficCtx.fill();
      trafficCtx.fillStyle=bodyColor;roundedRect(trafficCtx,-len/2,-wid/2,len,wid,Math.min(2.5,wid*.52));trafficCtx.fill();
      trafficCtx.fillStyle='rgba(255,255,255,.54)';roundedRect(trafficCtx,-len*.18,-wid*.30,len*.44,wid*.60,1.4);trafficCtx.fill();
      trafficCtx.fillStyle='rgba(255,255,255,.18)';roundedRect(trafficCtx,-len*.42,-wid*.22,len*.18,wid*.44,1.0);trafficCtx.fill();
      if(camera.zoom>=14.0){
        trafficCtx.fillStyle=car.braking?'rgba(220,80,80,.88)':'rgba(190,90,90,.50)';trafficCtx.fillRect(len*.31,-wid*.18,1.2,wid*.12);trafficCtx.fillRect(len*.31,wid*.06,1.2,wid*.12);
        var blinkOn=car.turnSignal&&Math.floor((performance.now()+car.blinkPhase*400)/260)%2===0;
        if(blinkOn){trafficCtx.fillStyle='rgba(223,164,70,.95)';var sideY=car.turnSignal==='right'?-wid*.30:wid*.18;trafficCtx.fillRect(len*.31,sideY,1.3,wid*.12);trafficCtx.fillRect(-len*.39,sideY,1.2,wid*.12);}
      }
    }
    trafficCtx.restore();
  }
  function cityTrafficFade(network){
    if(!network)return 0;var city=cities[network.cityId];if(!city)return 1;
    var d=cityDistance({lat:camera.lat,lng:camera.lng},city);
    if(camera.zoom<7.8)return .28; if(d<.18)return 1; if(d<.52)return 1-(d-.18)/.34*.45;
    if(camera.zoom<9.2)return .42; return Math.max(.10,1-(d-.52)/.88);
  }
  function validateTrafficNetwork(network){
    if(!network||!Array.isArray(network.lanes)||!Array.isArray(network.cars))return false;
    if(!network.lanes.length||!network.cars.length)return false;
    var valid=0;
    for(var i=0;i<network.cars.length;i++){var car=network.cars[i];if(!car)continue;
      if(!isFinite(car.laneIndex)||car.laneIndex<0||car.laneIndex>=network.lanes.length)continue;
      var lane=network.lanes[car.laneIndex];if(!lane||!lane.length||!Array.isArray(lane.points)||lane.points.length<2)continue;
      if(!isFinite(car.progress))car.progress=0;if(!isFinite(car.speed))car.speed=car.desiredSpeed||6;valid++;}
    return valid>0;
  }
  function trafficAdaptiveBudgetScale(){
    var ms=TRAFFIC.realFrameMs||TRAFFIC.smoothFrameMs||16, g=PRODUCTION_PROFILE.fpsBudgetGuard, scale=1;
    if(ms>g.bad)scale=.38;else if(ms>g.poor)scale=.50;else if(ms>g.fair)scale=.66;else if(ms>g.good)scale=.82;else if(ms>g.excellent)scale=.94;
    return scale*(mobileLike?PRODUCTION_PROFILE.mobileBudgetScale:PRODUCTION_PROFILE.desktopBudgetScale);
  }
  function trafficAdaptiveDensityScale(){
    var ms=TRAFFIC.realFrameMs||TRAFFIC.smoothFrameMs||16, g=PRODUCTION_PROFILE.fpsBudgetGuard;
    if(ms>g.bad)return .72;if(ms>g.poor)return .80;if(ms>g.fair)return .88;if(ms>g.good)return .94;return 1;
  }
  function renderTraffic(network){
    var w=trafficCanvas.clientWidth, h=trafficCanvas.clientHeight;
    trafficCtx.clearRect(0,0,w,h);
    if(network&&!validateTrafficNetwork(network))network=null;
    var opacity=trafficOpacity(camera.zoom,network);
    if(opacity<=.01||!network){TRAFFIC.stats={drawn:0,cars:0,lanes:network?network.lanes.length:0,mode:'none'};return;}
    var offset=laneOffsetPixels(camera.zoom), margin=72;
    var visibleDensity=clamp(trafficVisibleDensity(camera.zoom)*trafficAdaptiveDensityScale(),.035,1);
    var minimumCarFade=trafficMinimumCarFade(camera.zoom);
    var baseRenderBudget=Math.round(trafficRenderBudget(camera.zoom)*cityTrafficMultiplier(network.cityId));
    var renderBudget=camera.zoom>=12.85?network.cars.length:baseRenderBudget;
    var zoomAlpha=trafficZoomAlphaMultiplier(camera.zoom);
    var cityFade=cityTrafficFade(network);var drawn=0;
    for(var i=0;i<network.cars.length;i++){
      var car=network.cars[i];
      var densityFade=Math.max(carDensityFade(car,visibleDensity),minimumCarFade);
      var budgetFade=carBudgetFade(car,renderBudget,network.cars.length);
      var lane=network.lanes[car.laneIndex];if(!lane)continue;
      var sample=laneSample(lane,car.progress);
      var x=sample.x+sample.dy*offset, y=sample.y-sample.dx*offset;
      if(x<-margin||y<-margin||x>w+margin||y>h+margin)continue;
      var spawnFade=carSpawnFade(car);
      var targetAlpha=opacity*zoomAlpha*1*cityFade*densityFade*spawnFade*budgetFade;
      var localOpacity=smoothCarAlpha(car,targetAlpha);
      if(localOpacity<=.006)continue;
      drawTrafficCar(x,y,Math.atan2(sample.dy,sample.dx),car,localOpacity);drawn++;
    }
    TRAFFIC.stats={drawn:drawn,cars:network.cars.length,lanes:network.lanes.length,mode:trafficVisualMode(camera.zoom)};
  }
  // ========================== END ported traffic sim ==========================

  // ---- DOM layers ----
  var stage=document.getElementById('stage');
  var imgCountry=document.getElementById('imgCountry');
  var lcountry=document.getElementById('lcountry');
  var trafficCanvas=document.getElementById('traffic');
  var trafficCtx=trafficCanvas.getContext('2d',{alpha:true});
  var DPR=Math.min(window.devicePixelRatio||1, mobileLike?1.0:1.25);
  function sizeCanvas(){ trafficCanvas.width=Math.round(REF_W*DPR); trafficCanvas.height=Math.round(REF_H*DPR); trafficCanvas.style.width=REF_W+'px'; trafficCanvas.style.height=REF_H+'px'; trafficCtx.setTransform(DPR,0,0,DPR,0,0); }
  sizeCanvas();

  var wideLayers={}, streetLayers={}, wideImgs={}, streetImgs={};
  Array.prototype.forEach.call(document.querySelectorAll('.l-wide'),function(el){var c=el.getAttribute('data-city');wideLayers[c]=el;wideImgs[c]=el.querySelector('img');});
  Array.prototype.forEach.call(document.querySelectorAll('.l-street'),function(el){var c=el.getAttribute('data-city');streetLayers[c]=el;streetImgs[c]=el.querySelector('img');});

  // ---- asset loading (preload all → blank-less crossfades) ----
  var BASE='flyover/';
  imgCountry.src=BASE+'country.webp';
  ORDER.forEach(function(c){ wideImgs[c].src=BASE+c+'-wide.webp'; streetImgs[c].src=BASE+c+'-street.webp'; });
  imgCountry.onload=function(){kick();};
  ORDER.forEach(function(c){ wideImgs[c].onload=function(){kick();}; streetImgs[c].onload=function(){kick();}; });

  var nets={};       // city -> prepared network (lazy)
  var netLoading={};
  var CAR_CAP=mobileLike?120:200;
  function loadNet(city){
    if(nets[city]||netLoading[city])return;
    netLoading[city]=true;
    fetch(BASE+city+'.net.json').then(function(r){return r.json();}).then(function(net){
      // hydrate cars with the runtime-only fields (movement logic unchanged)
      var cars=net.cars.slice(0,CAR_CAP).map(function(c){
        var rgb=hexToRgb(c.color);
        return {cityId:net.cityId,laneIndex:c.laneIndex,nextLaneIndex:null,turnSignal:null,turnSignalUntil:0,
          progress:c.progress,speed:c.speed,desiredSpeed:c.desiredSpeed,baseDesiredSpeed:c.baseDesiredSpeed,
          color:c.color,colorRgb:rgb,flowRgb:rgb,length:c.length,width:c.width,laneLength:c.laneLength,
          stopTimer:0,stopBias:c.stopBias,blinkPhase:c.blinkPhase,braking:false,seed:c.seed,visualAlpha:0};
      });
      nets[city]={cityId:net.cityId,camera:net.camera,viewport:net.viewport,lanes:net.lanes,cars:cars};
      kick();
    }).catch(function(){ netLoading[city]=false; });
  }

  // ---- progress + journey → layer transforms ----
  var progress=(function(){var m=/[#&]p=([0-9.]+)/.exec(location.hash||'');return m?clamp(parseFloat(m[1]),0,1):0.210;})();
  var innerW=window.innerWidth, innerH=window.innerHeight;
  var lastActive=null, lastTrafficTs=0, lastTrafficStep=0;

  function setLayer(el,op,scale){
    if(op<=.003){ if(el.style.opacity!=='0'){el.style.opacity='0';el.style.visibility='hidden';} return; }
    el.style.visibility='visible'; el.style.opacity=op.toFixed(3); el.style.transform='scale('+scale.toFixed(4)+')';
  }

  function paintLayers(){
    innerW=window.innerWidth; innerH=window.innerHeight;
    var t=targetFromProgress(progress);
    var Zv=t.zoom; var ac=activeCityOf(t.lat,t.lng); var cid=ac[0], dist=ac[1];
    var zN=clamp((Zv-9.0)/(15.35-9.0),0,1);
    var cover=Math.max(innerW/REF_W, innerH/REF_H);

    var wStreet=smoothstep(11.8,13.4,Zv);
    var wCountry=smoothstep(0.42,1.0,dist);
    var base=1-wStreet;
    var wideOp=base*(1-wCountry);
    var countryOp=base*wCountry;

    var wideScale=cover*lerp(1.00,1.85,zN);
    var streetScale=cover*lerp(0.92,1.16,zN);
    var countryScale=cover*(1.08+0.18*(1-zN));

    // country
    setLayer(lcountry,countryOp,countryScale);
    // cities — only the active city's layers visible
    for(var i=0;i<ORDER.length;i++){
      var c=ORDER[i], aActive=(c===cid);
      setLayer(wideLayers[c], aActive?wideOp:0, wideScale);
      setLayer(streetLayers[c], aActive?wStreet:0, streetScale);
    }
    // traffic canvas tracks the active street layer's transform + opacity
    trafficCanvas.style.transform='scale('+streetScale.toFixed(4)+')';
    trafficCanvas.style.opacity=(wStreet*0.96).toFixed(3);
    trafficCanvas.style.visibility = wStreet>.02 ? 'visible':'hidden';

    // freeze the sim camera on the active city + (re)build the pure projection
    if(nets[cid]){ camera=nets[cid].camera; buildProject(camera,REF_W,REF_H); }
    paintLayers._cid=cid; paintLayers._Zv=Zv; paintLayers._dist=dist; paintLayers._wStreet=wStreet;

    if(DBG){ hud.textContent='p='+progress.toFixed(3)+' Zv='+Zv.toFixed(2)+'\ncity='+cid+' dist='+dist.toFixed(2)+'\nwStreet='+wStreet.toFixed(2)+' wCountry='+wCountry.toFixed(2)+'\ncars='+TRAFFIC.stats.drawn+'/'+TRAFFIC.stats.cars+' '+TRAFFIC.stats.mode; }
  }

  function stepTraffic(ts){
    var cid=paintLayers._cid, wStreet=paintLayers._wStreet||0;
    if(wStreet<0.04){ return; }            // street not visible → no car work
    if(!nets[cid]){ loadNet(cid); return; }
    var net=nets[cid];
    camera=net.camera; buildProject(camera,REF_W,REF_H);
    // ~30fps (desktop) / ~24fps (touch) traffic step, like the live map
    var interval=lowPowerDevice?50:(mobileLike?42:32);
    if(lastTrafficStep && (ts-lastTrafficStep)<interval-2){ return; }
    var rawMs=lastTrafficStep?Math.max(8,ts-lastTrafficStep):16;
    TRAFFIC.smoothFrameMs=TRAFFIC.smoothFrameMs?lerp(TRAFFIC.smoothFrameMs,rawMs,.08):rawMs;
    lastTrafficStep=ts;
    var dt=Math.min(.080,rawMs/1000);
    updateTrafficCars(net, mobileLike?dt*.82:dt);
    renderTraffic(net);
  }

  // ---- static-when-idle loop: runs ONLY while the host is writing progress ----
  var running=false, paused=!!window.__mapPaused, lastWrite=0;
  var IDLE_MS=220;
  function loop(ts){
    if(paused){ running=false; return; }
    if(lastRaf){ var d=Math.min(120,ts-lastRaf); TRAFFIC.realFrameMs=TRAFFIC.realFrameMs?TRAFFIC.realFrameMs*0.9+d*0.1:d; }
    lastRaf=ts;
    paintLayers();
    if(!reduced) stepTraffic(ts);
    var fresh=(performance.now()-lastWrite)<IDLE_MS;
    // keep going while the host is actively scrolling; otherwise settle to a STILL frame and stop.
    if(fresh){ requestAnimationFrame(loop); }
    else { paintLayers(); running=false; lastRaf=0; }   // final still frame → zero further repaint
  }
  var lastRaf=0;
  function kick(){
    lastWrite=performance.now();
    if(reduced){ paintLayers(); return; }   // reduced-motion: reposition only, no car animation/loop
    if(!running && !paused){ running=true; lastRaf=0; requestAnimationFrame(loop); }
  }

  // ---- host signals (mirror map-bg.html): __journeyProgress (driven by scroll) + __mapPaused ----
  try{
    var _p=progress;
    Object.defineProperty(window,'__journeyProgress',{
      configurable:true,
      get:function(){return _p;},
      set:function(v){ var nv=clamp(+v,0,1); _p=nv; progress=nv; loadNet(activeCityOf(targetFromProgress(nv).lat,targetFromProgress(nv).lng)[0]); kick(); }
    });
  }catch(e){ /* fallback: poll */ setInterval(function(){ if(typeof window.__journeyProgress==='number'&&window.__journeyProgress!==progress){progress=window.__journeyProgress;kick();} },120); }
  try{
    Object.defineProperty(window,'__mapPaused',{
      configurable:true,
      get:function(){return paused;},
      set:function(v){ var nv=!!v; if(nv===paused)return; paused=nv; if(!nv){kick();} }
    });
  }catch(e){}

  // debug/inspection hook (parity with map-bg's window.__mapState)
  window.__flyState=function(){var t=targetFromProgress(progress);return {progress:progress,zoom:+t.zoom.toFixed(2),city:paintLayers._cid,dist:+(paintLayers._dist||0).toFixed(2),drawn:TRAFFIC.stats.drawn,cars:TRAFFIC.stats.cars,running:running,paused:paused,realFrameMs:+(TRAFFIC.realFrameMs||0).toFixed(1)};};

  window.addEventListener('resize', function(){ kick(); }, {passive:true});

  // boot: preload the active + neighbour networks, paint the first still frame
  var bootCity=activeCityOf(targetFromProgress(progress).lat,targetFromProgress(progress).lng)[0];
  loadNet(bootCity);
  paintLayers();
  kick();
})();
</script>
</body>
</html>
