<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ukraine Driving Practice Map — Path B (idle traffic) — OpenFreeMap base, camera freezes when idle but cars keep moving at a low idle fps (15 touch / 24 desktop)</title>
<meta name="description" content="Path B: the smooth pre-PMTiles OpenFreeMap living map. When the scroll is idle the CAMERA/tiles freeze (the glass backdrop-filter rests on a static base) but the traffic CARS keep moving at a low idle fps (15 touch / 24 desktop) so the map still looks alive — much cheaper than the 60fps loop. Full 60fps motion during scroll; full freeze when hidden / reduced-motion / low-power." />
<link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin />
<link rel="stylesheet" href="vendor/maplibre-gl.css" />
<link rel="stylesheet" href="assets/map-bg.css?v=5">
</head>
<body>
<main class="journey" id="journey" aria-label="Ukraine scroll map journey using a reduced-detail MapLibre Positron basemap">
  <section class="stage" aria-label="Map stage">
    <div id="map" aria-hidden="true"></div>
    <canvas id="traffic" aria-hidden="true"></canvas>
    <div class="tint" aria-hidden="true"></div>
    <div class="veil" aria-hidden="true"></div>
    <div class="focus-softener" id="focusSoftener" aria-hidden="true"></div>
    <div class="depth" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
    <div class="loading" id="loading" aria-live="polite">
      <div class="loading-card">
        <div class="loading-title">Ukraine map</div>
        <div class="loading-sub">Preparing roads, labels and traffic…</div>
        <div class="loading-route" aria-hidden="true"></div>
      </div>
    </div>
    <div class="qa-metrics" id="qaMetrics" aria-hidden="true"></div>
    <div class="attribution">© <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors · <a href="https://openfreemap.org" target="_blank" rel="noopener">OpenFreeMap</a></div>
  </section>
</main>
<!-- MapLibre 5.24.0 self-hosted (vendor/) — same-origin: no CDN DNS/TLS/redirect hop, no supply-chain risk, HTTP-cache-warm via the parent's prefetch. -->
<script src="vendor/maplibre-gl.js"></script>
<script src="assets/map-bg.js?v=5"></script>
</body>
</html>
