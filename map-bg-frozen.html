      trafficCtx.rotate(angle);

      if(blend.dot > .01){
        // z13 cap: the journey now rests in pure-dot mode (lodBlend dot=1 at z13), so the dot is the car.
        // Floor it bigger at the city-arrival zoom (≥12.6 → ~2.5px) so traffic READS at the district view
        // instead of collapsing to a ~1px speck; far/country zooms keep the small 1.05 floor.
        const radius = Math.max(camera.zoom >= 12.6 ? 2.5 : 1.05, wid * (camera.zoom < 12.4 ? .24 : .30));
        trafficCtx.globalAlpha = opacity * blend.dot;

        // Dot mode only: no dash/trail. This keeps zoomed-out traffic light and readable.
        trafficCtx.fillStyle = bodyColor;
        trafficCtx.beginPath();
        trafficCtx.arc(0, 0, radius, 0, Math.PI * 2);
        trafficCtx.fill();

        if(camera.zoom >= 12.45){
          trafficCtx.globalAlpha = opacity * blend.dot * .28;
          trafficCtx.fillStyle = 'rgba(255,255,255,.42)';
          trafficCtx.beginPath();
          trafficCtx.arc(-radius * .28, -radius * .24, radius * .32, 0, Math.PI * 2);
          trafficCtx.fill();
        }
      }

      if(blend.capsule > .01){
        trafficCtx.globalAlpha = opacity * blend.capsule;

        trafficCtx.fillStyle = 'rgba(33,65,45,.075)';
        roundedRect(trafficCtx, -len*.35, -wid*.18 + 1.0, len*.70, wid*.38, 1.3);
        trafficCtx.fill();

        trafficCtx.fillStyle = bodyColor;
        roundedRect(trafficCtx, -len*.44, -wid*.32, len*.88, wid*.64, Math.min(2.0, wid*.44));
        trafficCtx.fill();

        trafficCtx.globalAlpha = opacity * blend.capsule * .54;
        trafficCtx.fillStyle = 'rgba(255,255,255,.42)';
        roundedRect(trafficCtx, -len*.10, -wid*.22, len*.28, wid*.44, 1.0);
        trafficCtx.fill();

        if(car.braking && camera.zoom >= 13.0){
          trafficCtx.globalAlpha = opacity * blend.capsule * .75;
          trafficCtx.fillStyle = 'rgba(210,88,88,.85)';
          trafficCtx.fillRect(len*.34, -wid*.16, 1.0, wid*.12);
          trafficCtx.fillRect(len*.34, wid*.04, 1.0, wid*.12);
        }
      }

      if(blend.car > .01){
        trafficCtx.globalAlpha = opacity * blend.car;

        trafficCtx.fillStyle = 'rgba(33,65,45,.12)';
        roundedRect(trafficCtx, -len*.45, -wid*.26 + 1.6, len*.90, wid*.56, 1.8);
        trafficCtx.fill();

        trafficCtx.fillStyle = bodyColor;
        roundedRect(trafficCtx, -len/2, -wid/2, len, wid, Math.min(2.5, wid*.52));
        trafficCtx.fill();

        trafficCtx.fillStyle = 'rgba(255,255,255,.54)';
        roundedRect(trafficCtx, -len*.18, -wid*.30, len*.44, wid*.60, 1.4);
        trafficCtx.fill();

        trafficCtx.fillStyle = 'rgba(255,255,255,.18)';
        roundedRect(trafficCtx, -len*.42, -wid*.22, len*.18, wid*.44, 1.0);
        trafficCtx.fill();

        if(camera.zoom >= 14.0){
          trafficCtx.fillStyle = car.braking ? 'rgba(220,80,80,.88)' : 'rgba(190,90,90,.50)';
          trafficCtx.fillRect(len*.31, -wid*.18, 1.2, wid*.12);
          trafficCtx.fillRect(len*.31,  wid*.06, 1.2, wid*.12);

          const blinkOn = car.turnSignal && Math.floor((performance.now() + car.blinkPhase * 400) / 260) % 2 === 0;
          if(blinkOn){
            trafficCtx.fillStyle = 'rgba(223,164,70,.95)';
            const sideY = car.turnSignal === 'right' ? -wid*.30 : wid*.18;
            trafficCtx.fillRect(len*.31, sideY, 1.3, wid*.12);
            trafficCtx.fillRect(-len*.39, sideY, 1.2, wid*.12);
          }
        }
      }

      trafficCtx.restore();
    }

    function cityTrafficFade(network){
      if(!network) return 0;
      const city = cities[network.cityId];
      if(!city) return 1;
      const d = cityDistance({lat:camera.lat, lng:camera.lng}, city);
      if(camera.zoom < 7.8) return .28;
      if(d < .18) return 1;
      if(d < .52) return 1 - (d - .18) / .34 * .45;
      if(camera.zoom < 9.2) return .42;
      return Math.max(.10, 1 - (d - .52) / .88);
    }


    function recoverVisibleRoadNetwork(currentNetwork){
      if(camera.zoom < 10.85) return null;

      const now = performance.now();
      if(now - TRAFFIC.lastRecoveryAttempt < 900) return null;
      TRAFFIC.lastRecoveryAttempt = now;

      const cityId = activeCityId();
      let lanes = [];

      try{
        lanes = sampleRoadLanes(cityId);
      }catch(e){
        lanes = [];
      }

      // Recovery is now logic-only: rebuild from real road lanes, but do not force cars
      // onto the visible viewport. Forced reseeding made cars look fake and laggy.
      if(lanes.length >= 6){
        const recovered = {
          cityId,
          lanes,
          cars:createCarsForLanes(cityId, lanes, currentNetwork ? currentNetwork.cars : []),
          createdAt:currentNetwork ? currentNetwork.createdAt : now,
          buildZoom:camera.zoom,
          qualityPass:camera.zoom >= 11.0,
          recovered:true
        };

        warmTrafficNetwork(recovered, .8);
        TRAFFIC.networks.set(cityId, recovered);
        TRAFFIC.lastVisibleNetwork = recovered;
        TRAFFIC.diagnostics.reason = 'road-logic-recovered';
        return recovered;
      }

      TRAFFIC.diagnostics.reason = 'waiting-real-road-geometry';
      return currentNetwork || null;
    }



    function warmTrafficNetwork(network, seconds=.6){
      if(!network || !network.cars || !network.cars.length) return;
      // Warm a newly rebuilt network very lightly so spacing / speeds settle before the cars fade in.
      // This runs only on rebuild, not every frame.
      const steps = Math.min(14, Math.max(4, Math.round(seconds / .08)));
      for(let i=0; i<steps; i++){
        updateTrafficCars(network, .06);
      }
    }

    function validateTrafficNetwork(network){
      if(!network || !Array.isArray(network.lanes) || !Array.isArray(network.cars)) return false;
      if(!network.lanes.length || !network.cars.length) return false;

      let validCars = 0;
      for(const car of network.cars){
        if(!car) continue;
        if(!Number.isFinite(car.laneIndex) || car.laneIndex < 0 || car.laneIndex >= network.lanes.length) continue;
        const lane = network.lanes[car.laneIndex];
        if(!lane || !lane.length || !Array.isArray(lane.points) || lane.points.length < 2) continue;
        if(!Number.isFinite(car.progress)) car.progress = 0;
        if(!Number.isFinite(car.speed)) car.speed = car.desiredSpeed || 6;
        validCars++;
      }

      return validCars > 0;
    }

    function trafficAdaptiveBudgetScale(){
      const ms = TRAFFIC.realFrameMs || TRAFFIC.smoothFrameMs || 16;
      const guard = PRODUCTION_PROFILE.fpsBudgetGuard;
      let scale = 1;

      if(ms > guard.bad) scale = .38;
      else if(ms > guard.poor) scale = .50;
      else if(ms > guard.fair) scale = .66;
      else if(ms > guard.good) scale = .82;
      else if(ms > guard.excellent) scale = .94;

      return scale * (mobileLike ? PRODUCTION_PROFILE.mobileBudgetScale : PRODUCTION_PROFILE.desktopBudgetScale);
    }

    function trafficAdaptiveDensityScale(){
      const ms = TRAFFIC.realFrameMs || TRAFFIC.smoothFrameMs || 16;
      const guard = PRODUCTION_PROFILE.fpsBudgetGuard;
      if(ms > guard.bad) return .72;
      if(ms > guard.poor) return .80;
      if(ms > guard.fair) return .88;
      if(ms > guard.good) return .94;
      return 1;
    }

    function renderTraffic(network, allowRecovery=true){
      const w = trafficCanvas.clientWidth;
      const h = trafficCanvas.clientHeight;
      trafficCtx.clearRect(0, 0, w, h);

      if(network && !validateTrafficNetwork(network)){
        TRAFFIC.diagnostics.reason = 'invalid-network';
        network = null;
      }

      const opacity = trafficOpacity(camera.zoom, network);
      if((opacity <= .01 || !network) && allowRecovery && camera.zoom >= 10.85){
        const recovered = recoverVisibleRoadNetwork(network);
        if(recovered){
          updateTrafficCars(recovered, 0);
          renderTraffic(recovered, false);
          return;
        }
      }

      if(opacity <= .01 || !network){
        TRAFFIC.stats = {drawn:0, cars:0, lanes:network ? network.lanes.length : 0, mode:'none'};
        updateTrafficDebug(network);
        return;
      }

      const offset = laneOffsetPixels(camera.zoom);
      const margin = 72;
      const visibleDensity = clamp(trafficVisibleDensity(camera.zoom) * trafficAdaptiveDensityScale(), .035, 1);
      const minimumCarFade = trafficMinimumCarFade(camera.zoom);
      const baseRenderBudget = Math.round(trafficRenderBudget(camera.zoom) * cityTrafficMultiplier(network.cityId));
      const renderBudget = camera.zoom >= 12.85 ? network.cars.length : baseRenderBudget;
      const zoomAlpha = trafficZoomAlphaMultiplier(camera.zoom);
      const cityFade = cityTrafficFade(network);
      let drawn = 0;

      for(let i = 0; i < network.cars.length; i++){
        const car = network.cars[i];
        const densityFade = Math.max(carDensityFade(car, visibleDensity), minimumCarFade);
        const budgetFade = carBudgetFade(car, renderBudget, network.cars.length);
        const lane = network.lanes[car.laneIndex];
        if(!lane) continue;
        const sample = laneSample(lane, car.progress);
        let x = sample.x + sample.dy * offset;
        let y = sample.y - sample.dx * offset;
        let hx = sample.dx, hy = sample.dy;
        // Render-only junction glide: ease the drawn position + heading across the gap so the car flows
        // around the corner instead of popping to the next lane's start.
        if(car.brT != null && car.brT < 1){
          const fromLane = network.lanes[car.brFromLane];
          if(fromLane){
            // *0.999: laneSample() WRAPS at distance==length back to 0 (the lane START), so sampling exactly
            // fromLane.length would glide the car from the wrong end. Sample just before the end.
            const fs = laneSample(fromLane, fromLane.length * 0.999);
            const fx = fs.x + fs.dy * offset, fy = fs.y - fs.dx * offset;
            const t = car.brT * car.brT * (3 - 2 * car.brT);
            x = fx + (x - fx) * t; y = fy + (y - fy) * t;
            hx = fs.dx + (sample.dx - fs.dx) * t; hy = fs.dy + (sample.dy - fs.dy) * t;
          }
        }

        if(x < -margin || y < -margin || x > w + margin || y > h + margin) continue;

        const labelFactor = cityLabelFadeFactor(network, x, y);
        if(labelFactor <= .01) continue;

        const spawnFade = carSpawnFade(car);
        const targetAlpha = opacity * zoomAlpha * labelFactor * cityFade * densityFade * spawnFade * budgetFade;
        const localOpacity = smoothCarAlpha(car, targetAlpha);

        if(localOpacity <= .006) continue;
        // Ease the rendered heading toward the lane direction so corners turn smoothly (no rotation snap).
        const targetAng = Math.atan2(hy, hx);
        car.rAng = (car.rAng == null) ? targetAng : angleLerp(car.rAng, targetAng, .28);
        drawTrafficCar(x, y, car.rAng, car, localOpacity);
        drawn++;
      }

      TRAFFIC.stats = {drawn, cars:network.cars.length, lanes:network.lanes.length, mode:trafficVisualMode(camera.zoom)};

      if(drawn < 3 && camera.zoom >= 11.2 && performance.now() - TRAFFIC.lastRoadQuery > 1100){
        // Stable-cars v4:
        // Do not reset lastRoadQuery here. Resetting it can trigger repeated network rebuilds,
        // which makes many cars vanish/reappear. Keep the existing real-road network stable.
        TRAFFIC.diagnostics.reason = 'low-visible-keep-existing-network';
      }

      updateTrafficDebug(network);
    }

    function updateTrafficDebug(){
      // Production build: debug UI removed.
    }

    resizeTrafficCanvas();


    let didStyle = false;
    function hideLoading(){
      if(loading) loading.classList.add('is-hidden');
    }


    const QA_METRICS_ENABLED = /[?&]qa=1/.test(location.search);
    let lastQaMetricsUpdate = 0;
    let qaWorstFrameMs = 0;
    let qaFrameSamples = 0;
    let qaFrameSum = 0;

    function qaStatus(value, good, warn){
      if(value <= good) return 'ok';
      if(value <= warn) return 'warn';
      return 'bad';
    }

    function updateQaMetricsPanel(){
      if(!QA_METRICS_ENABLED || !qaMetrics) return;
      const now = performance.now();
      qaWorstFrameMs = Math.max(qaWorstFrameMs, TRAFFIC.smoothFrameMs || 0);
      qaFrameSamples++;
      qaFrameSum += TRAFFIC.smoothFrameMs || 0;
      if(now - lastQaMetricsUpdate < 260) return;
      lastQaMetricsUpdate = now;

      const network = TRAFFIC.lastVisibleNetwork;
      const active = TRAFFIC.activeCityId || activeCityId();
      const stats = TRAFFIC.stats || {};
      const frameMs = TRAFFIC.smoothFrameMs || 16.7;
      const fps = 1000 / Math.max(1, frameMs);
      const avgFrame = qaFrameSamples ? qaFrameSum / qaFrameSamples : frameMs;
      const multiplier = cityTrafficMultiplier(active);
      const roadQueryAge = now - (TRAFFIC.lastRoadQuery || 0);
      const sourceEnsureAge = now - (TRAFFIC.lastSourceRoadEnsure || 0);
      const frameClass = qaStatus(frameMs, 22, 34);

      qaMetrics.classList.add('is-visible');
      qaMetrics.innerHTML =
        `<b>QA metrics</b> <span class="${frameClass}">${fps.toFixed(1)} fps / ${frameMs.toFixed(1)}ms</span><br>` +
        `build: ${window.__UKRAINE_MAP_BUILD_ID__ || 'unknown'}<br>` +
        `avg: ${avgFrame.toFixed(1)}ms · worst: ${qaWorstFrameMs.toFixed(1)}ms<br>` +
        `city: ${active || 'none'} · car multiplier: ${multiplier}x · lane coverage: ${cityLaneCoverageMultiplier(active).toFixed(2)}x · zoom: ${camera.zoom.toFixed(2)}<br>` +
        `cars drawn: ${stats.drawn || 0} / ${stats.cars || (network ? network.cars.length : 0)}<br>` +
        `lanes: ${stats.lanes || (network ? network.lanes.length : 0)} · road layers: ${TRAFFIC.roadLayerIds.length} · mode: ${stats.mode || 'n/a'}<br>` +
        `network city: ${network ? network.cityId : 'none'} · quality: ${network && network.qualityPass ? 'yes' : 'no'}<br>` +
        `traffic reason: ${(TRAFFIC.diagnostics && TRAFFIC.diagnostics.reason) || 'n/a'}<br>` +
        `road query age: ${Math.round(roadQueryAge)}ms · sourcedata age: ${Math.round(sourceEnsureAge)}ms<br>` +
        `Russia override applied: ${actualRussiaNameOverrideApplied ? '<span class="ok">yes</span>' : '<span class="warn">not yet</span>'}<br>` +
        `checks: strict roads <span class="ok">on</span>, fake fallback <span class="ok">off</span>, styledata relabel <span class="ok">off</span>`;
    }


    // ── Pre-warm the journey's tiles into the browser HTTP cache after the first city renders, so a later
    //    fast scroll hits WARM cache (tiles appear instantly) instead of fetching over the network and
    //    blanking. The journey is fixed (known cities + zooms), so we warm each city across the zoom bands
    //    the fly crosses (7/9/11/13, letting MapLibre overzoom fill the between-levels) + a country overview.
    //    Capable-desktop only (the whole map is already gated); skipped on Save-Data; best-effort + silent.
    function prewarmJourneyTiles(){
      try{
        if(window.__journeyTilesWarmed) return; window.__journeyTilesWarmed = true;
        const conn = navigator.connection; if(conn && conn.saveData) return;
        const style = map.getStyle(); if(!style || !style.sources) return;
        let tmpl = null;
        for(const id in style.sources){
          const s = style.sources[id];
          if(s && s.type === 'vector'){
            const src = map.getSource(id);
            if(src && src.tiles && src.tiles.length){ tmpl = src.tiles[0]; break; }
            if(s.tiles && s.tiles.length){ tmpl = s.tiles[0]; break; }
          }
        }
        if(!tmpl || !/\{z\}.*\{x\}.*\{y\}/.test(tmpl)){ window.__journeyTilesTmpl = tmpl || 'none'; return; }
        window.__journeyTilesTmpl = tmpl;
        const lon2x = (lng,z)=>Math.floor((lng+180)/360*Math.pow(2,z));
        const lat2y = (lat,z)=>{ const r=lat*Math.PI/180; return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z)); };
        const urls = [];
        const add = (z,x,y)=>{ const n=Math.pow(2,z); if(x<0||y<0||x>=n||y>=n) return; urls.push(tmpl.replace('{z}',z).replace('{x}',x).replace('{y}',y)); };
        const centers = []; const seen = {};
        for(const k in cities){ const c=cities[k]; if(!c||typeof c.lat!=='number') continue; const key=c.lat.toFixed(2)+','+c.lng.toFixed(2); if(!seen[key]){ seen[key]=1; centers.push(c); } }
        // Travel band: the WHOLE Ukraine bbox at the low zooms the camera flies between cities at (~6-7),
        // so panning across the country during a fast scroll never hits an unloaded tile.
        const BB = {n:52.8, s:44.0, w:21.5, e:40.6};
        const bboxTiles = (z)=>{ const x0=lon2x(BB.w,z), x1=lon2x(BB.e,z), y0=lat2y(BB.n,z), y1=lat2y(BB.s,z); for(let x=x0;x<=x1;x++) for(let y=y0;y<=y1;y++) add(z,x,y); };
        // Order matters — the queue is fetched front-to-back, so cache the most-needed tiles FIRST.
        // 1) DISTRICT tiles (z13 only now — the zoom-capped peak; was z13–14, a 5×5 block per city) — these
        //    render the close city view; if not pre-cached they abort mid-fly and the city shows BLANK.
        centers.forEach(c=>[13].forEach(z=>{ const cx=lon2x(c.lng,z), cy=lat2y(c.lat,z); for(let dx=-2;dx<=2;dx++) for(let dy=-2;dy<=2;dy++) add(z,cx+dx,cy+dy); }));
        // 2) the city approach band (z9–12, 3×3),
        centers.forEach(c=>[9,10,11,12].forEach(z=>{ const cx=lon2x(c.lng,z), cy=lat2y(c.lat,z); for(let dx=-1;dx<=1;dx++) for(let dy=-1;dy<=1;dy++) add(z,cx+dx,cy+dy); }));
        // 3) the wide travel-band parents last (overzoom covers the fly even before these land).
        [7,8].forEach(bboxTiles);
        const queue = Array.from(new Set(urls)).slice(0, 560);
        window.__journeyTilesQueued = queue.length;
        let i=0; const CONC=6;
        const pump = ()=>{ if(i>=queue.length) return; const u=queue[i++]; fetch(u,{mode:'cors',priority:'low'}).catch(()=>{}).finally(pump); };
        for(let j=0;j<CONC;j++) pump();
      }catch(e){ window.__journeyTilesErr = String(e && e.message || e); }
    }

    map.on('load', () => {
      map.resize();
      resizeTrafficCanvas();
      didStyle = true;
      try { applyActualRussiaNameOverride(); } catch(e) {}
      applySmoothMapLayerTransitions();
      setTimeout(() => { try { ensureTrafficNetwork(); } catch(e) {} }, 160);
      setTimeout(() => { try { ensureTrafficNetwork(); } catch(e) {} }, 420);
      setTimeout(() => { try { ensureTrafficNetwork(); } catch(e) {} }, 980);
      setTimeout(() => { try { ensureTrafficNetwork(); } catch(e) {} }, 1650);
      setTimeout(hideLoading, 1500);
      map.on('sourcedata', () => {
        try{
          const cityId = activeCityId();
          const city = cities[cityId];
          const nearCity = city && cityDistance({lat:camera.lat, lng:camera.lng}, city) < .72;
          if(camera && camera.zoom >= 9.45 && nearCity){
            // Safe optimization: tile/source updates can fire many times while MapLibre loads.
            // Do not reset lastRoadQuery here; that bypasses ensureTrafficNetwork's throttle
            // and can make traffic feel laggy during city approaches.
            const now = performance.now();
            if(now - (TRAFFIC.lastSourceRoadEnsure || 0) > 520){
              TRAFFIC.lastSourceRoadEnsure = now;
              ensureTrafficNetwork();
            }
          }
        }catch(e){}
      });
      map.once('idle', () => {
        try { applyActualRussiaNameOverride(); } catch(e) {}
        try { applySmoothMapLayerTransitions(); } catch(e) {}
        try { ensureTrafficNetwork(); } catch(e) {}
        setTimeout(hideLoading, 180);
        setTimeout(prewarmJourneyTiles, 1400);   // background-warm the rest of the journey's tiles into cache
      });
    });
    map.on('styledata', () => {
      // Exact Lovable map style is CSS/filter-based. Layer opacity smoothing is applied once after load.
      try { applySmoothMapLayerTransitions(); } catch(e) {}
    });

    let target = {...initial};
    let camera = {...initial};
    let last = {...initial};
    let lastProgress = 0;
    let lastProgressTime = performance.now();
    let scrollVelocity = 0;
    let scheduled = false;
    let rafId = null;
    // Path B (idle-traffic): handle for the low-rate setTimeout loop that keeps ONLY the cars moving
    // (camera frozen) while the page is idle, and the timestamp of its last tick (for real-dt stepping).
    // rafId (full 60fps) and idleTimer (~IDLE_TRAFFIC_FPS) are mutually exclusive; both null = fully frozen.
    let idleTimer = null;
    let idleLastTick = 0;
    // Path B (idle-freeze): timestamp of the last host __journeyProgress write. The render loop runs
    // only while there's recent motion (a write within ~250ms) OR the camera is still easing to target;
    // once settled AND quiet it stops the rAF so the glass backdrop-filter has a static surface to rest on.
    let lastProgressChangeTime = performance.now();

    function updateTarget(){
      scheduled = false;
      const now = performance.now();
      const progress = nativeProgress();
      const dt = Math.max(16, now - lastProgressTime);
      scrollVelocity = Math.abs(progress - lastProgress) / dt;
      lastProgress = progress;
      lastProgressTime = now;
      target = targetFromProgress(progress);
    }

    function requestTarget(){
      if(!scheduled){
        scheduled = true;
        requestAnimationFrame(updateTarget);
      }
    }

    function render(){
      rafId = null;
      // Background-use: when the host pauses the map (tweak off / reduced-motion), do no work and
      // stop the loop entirely — no rAF is rescheduled, so we burn zero frame callbacks while
      // paused. startLoop() (called from the __mapPaused resume hook below) restarts it.
      if(window.__mapPaused){ return; }

      // Path B render-frame counter (read by the verify harness to prove ZERO frames while idle).
      TRAFFIC.frames = (TRAFFIC.frames | 0) + 1;
      window.__rafFrames = TRAFFIC.frames;

      // GPU load signal: the real full-rate frame cadence (includes the page's glass compositing).
      const _raf = performance.now();
      if(TRAFFIC.lastRaf){
        const d = Math.min(120, _raf - TRAFFIC.lastRaf);
        TRAFFIC.realFrameMs = TRAFFIC.realFrameMs ? TRAFFIC.realFrameMs * 0.9 + d * 0.1 : d;
      }
      TRAFFIC.lastRaf = _raf;

      // When the host drives progress, poll it every frame so the camera tracks
      // even without internal scroll events.
      if(typeof window.__journeyProgress === 'number') updateTarget();

      // ───────────────────────── CAMERA CALIBRATION (the only knobs) ─────────────────────────
      // The `stops` keyframes ALREADY encode the whole cinematography (pull back to a wide view between
      // cities, then zoom in on arrival), interpolated with smoothstep in targetFromProgress(). So the
      // camera's only job is to SMOOTHLY follow that interpolated target — a single time-constant
      // exponential ease, frame-rate independent, no per-frame caps, no velocity hacks, no stepping.
      //   • bigger TAU = slower / calmer follow.  • zoom has its own (gentler) TAU than the pan.
      //   • PACE_LOADING stretches the time-constant while tiles stream so the camera can't outrun
      //     tile loading (and blank the map); 1.0 = full speed.
      const PAN_TAU_MS   = 600;    // fly (pan) follow time-constant
      // Zoom follows MUCH slower than the pan on purpose → "fly first, then zoom in": the camera reaches
      // the city at a wide zoom and only creeps toward max detail if you linger, so the journey is mostly
      // flown at mid zoom (not maxed). Bigger = enters max even slower / spends even less time maxed.
      const ZOOM_TAU_MS  = 700;    // zoom follow time-constant — responsive so the camera actually REACHES the street-level keyframes (heavy lag was the bug: it never caught up). Calm/gentle now comes from the spread-out keyframe ramp + wide travel keyframes, NOT from lag. Still slightly > pan so zoom trails the fly a touch (fly-then-zoom).
      const PACE_LOADING = 0.80;   // ease multiplier while tiles stream — kept HIGH so the tile-pace no
                                   // longer caps how far cities zoom in (it was stalling the climb to street
                                   // zoom at ~12). Blank is now guarded by the prewarm (city street tiles
                                   // are pre-cached), so the camera no longer needs to crawl for tiles.
      // ───────────────────────────────────────────────────────────────────────────────────────

      const _now = performance.now();
      const fdt = Math.min(64, Math.max(8, _now - (TRAFFIC.lastEaseTs || _now)));
      TRAFFIC.lastEaseTs = _now;

      let tilesReady = true;
      try{
        tilesReady = (typeof map.areTilesLoaded === 'function') ? map.areTilesLoaded()
                   : (typeof map.loaded === 'function') ? map.loaded() : true;
      }catch(e){}
      const pace  = tilesReady ? 1 : PACE_LOADING;
      // SETTLE-FASTER-WHEN-STOPPED: while the user is actively scrolling (a progress write <400ms ago) the
      // follow is EXACTLY the tuned cinematic ease (boost = 1). Once they STOP, gently shorten the follow
      // time-constant (ramped over 400→1000ms of quiet, up to 2.4×) so the camera homes onto its target in
      // ~1-2s instead of creeping its near-invisible tail for ~6s — that long tail kept the 60fps loop +
      // the page's heavy glass re-blur alive the whole time (the "heavier the longer you stay" heat). The
      // exponential ease still never overshoots, and the ramp avoids any visible speed-jump, so the active
      // fly feel is unchanged — only the post-scroll settle finishes more decisively.
      const _settleBoost = 1 + 1.4 * Math.min(1, Math.max(0, (_now - lastProgressChangeTime - 400) / 600));
      const kPan  = 1 - Math.exp(-(fdt * pace * _settleBoost) / PAN_TAU_MS);
      const kZoom = 1 - Math.exp(-(fdt * pace * _settleBoost) / ZOOM_TAU_MS);

      camera.lat  += (target.lat  - camera.lat)  * kPan;
      camera.lng  += (target.lng  - camera.lng)  * kPan;
      camera.zoom += (target.zoom - camera.zoom) * kZoom;

      // snap when essentially arrived (prevents endless sub-pixel easing)
      if(Math.abs(target.lat  - camera.lat)  < 0.00001) camera.lat  = target.lat;
      if(Math.abs(target.lng  - camera.lng)  < 0.00001) camera.lng  = target.lng;
      if(Math.abs(target.zoom - camera.zoom) < 0.001)   camera.zoom = target.zoom;

      // debug instrumentation (read by the e2b calibration harness; harmless in prod)
      window.__camZoom = camera.zoom; window.__camLat = camera.lat; window.__camLng = camera.lng;
      window.__camTargetZoom = target.zoom;

      // Did the camera actually move this frame? This drives BOTH the map jump AND (critically) the
      // traffic redraw below — so the cars are re-projected on every frame the map moves and can never
      // detach from the roads during a fast scroll/zoom (the cause of the "torn" look). When the camera
      // is settled, the traffic falls back to its ~30fps throttle to save GPU.
      const cameraMoved = Math.abs(camera.lat-last.lat) > 0.00001 || Math.abs(camera.lng-last.lng) > 0.00001 || Math.abs(camera.zoom-last.zoom) > 0.0001;
      if(cameraMoved){
        map.jumpTo({center:[camera.lng, camera.lat], zoom:camera.zoom});
        last = {...camera};
      }

      // Background-use throttle: the traffic sim + canvas draw is the expensive part, so run it at
      // a GPU-adaptive rate — ~30fps with headroom, stepping down to ~15fps when real frames are slow
      // (weak GPU, or the page's glass is heavy). Camera easing above stays full-rate.
      const trafficNow = performance.now();
      if(!TRAFFIC.lastFrame) TRAFFIC.lastFrame = trafficNow;
      const rfm = TRAFFIC.realFrameMs || 16;
      const baseInterval = lowPowerDevice ? 50 : (mobileLike ? 42 : 32);   // ~20fps low-power, ~24fps tablets/touch (battery), ~30fps desktop
      const TRAFFIC_INTERVAL = reduced ? 90 : (rfm > 40 ? 72 : rfm > 28 ? 52 : rfm > 22 ? 40 : baseInterval);
      if(cameraMoved || trafficNow - TRAFFIC.lastFrame >= TRAFFIC_INTERVAL - 2){
        const rawFrameMs = Math.max(8, trafficNow - TRAFFIC.lastFrame);
        const trafficDt = Math.min(.080, rawFrameMs / 1000);
        TRAFFIC.smoothFrameMs = TRAFFIC.smoothFrameMs
          ? lerp(TRAFFIC.smoothFrameMs, rawFrameMs, .08)
          : rawFrameMs;
        TRAFFIC.lastFrame = trafficNow;

        if(!document.hidden){
          try{
            const network = ensureTrafficNetwork();
            updateTrafficCars(network, reduced ? trafficDt * .5 : (mobileLike ? trafficDt * .82 : trafficDt));
            renderTraffic(network);
            window.__trafficDraws = (window.__trafficDraws | 0) + 1;   // Path B: traffic-canvas redraw counter (all modes)
          }catch(err){
            TRAFFIC.renderErrorCount++;
            TRAFFIC.diagnostics.reason = 'traffic-render-error';
            if(TRAFFIC.debug) console.warn('Traffic render error', err);
          }
          updateQaMetricsPanel();
        }
      }

      updateStoryAndHierarchy(target, camera, mobileLike);

      // ──────────────────── IDLE: freeze the CAMERA, keep the CARS alive (Path B) ────────────────────
      // Run the full-rate camera loop ONLY while something moves. The camera eases toward `target`
      // (above); once it has SETTLED on that target (within the SAME epsilons used for the snap above)
      // AND the host hasn't written a new __journeyProgress for ~250ms, there is nothing left to FLY — so
      // we stop the 60fps rAF (schedule no further frame). The map tiles/canvas then hold static (no more
      // map.jumpTo), giving the page's heavy backdrop-filter glass a STATIC base to rest on. But instead
      // of freezing EVERYTHING, we hand off to a low-rate (~IDLE_TRAFFIC_FPS) setTimeout loop that keeps
      // ONLY the cars moving: each idle tick advances + redraws the traffic canvas, so the page re-blurs
      // ~12×/sec instead of 60 (~5× cheaper) while the cars still look alive (the heavy blur hides the low
      // fps). The 60fps loop is WOKEN again (startLoop) on the next __journeyProgress write (scroll), on
      // resize, or on visibilitychange — startLoop cancels the idle timer and resumes easing from the
      // camera's EXACT current state, so the wake is hitch-free and the during-scroll motion stays
      // byte-for-byte the original. We only gate WHEN/at-what-RATE each piece runs, not HOW it moves.
      // Freeze the instant the camera stops moving VISIBLY — i.e. when this frame's per-frame delta is
      // below the `cameraMoved` thresholds above (~sub-pixel pan / sub-% zoom) — NOT when the
      // exponential ease reaches a mathematically-tiny ABSOLUTE gap. The old absolute-gap epsilons
      // (1e-5° pan / 1e-3 zoom) had a multi-second tail: after a fly the camera kept the 60fps loop
      // (and the page's heavy glass re-blur) running ~9s easing an already-invisible last bit, and with
      // intermittent scrolling it ~never reached that gap → the loop never froze → sustained GPU load →
      // the page felt "heavier the longer you stay" + spun the fans. The per-frame test freezes right
      // when the fly visually ends: <1s after a normal scroll-stop, the moment a big fly arrives. The
      // ease is a monotonic decay toward a FIXED target while quiet, so once the delta drops below the
      // threshold it stays there — no flicker. The camera holds where it visually arrived (sub-perceptual
      // residual on the blurred background) and eases on seamlessly when the next scroll wakes it.
      if(!cameraMoved && (performance.now() - lastProgressChangeTime) >= 250){
        rafId = null;
        enterIdle();   // → low-rate idle traffic, or a full freeze on hidden/reduced-motion/low-power
        return;        // no 60fps rAF rescheduled until woken
      }
      rafId = requestAnimationFrame(render);
    }

    // Idle traffic only runs on a context where it's both wanted and cheap-enough to be worth it: the knob
    // is on (>0), the tab is visible, the map isn't host-paused, motion is allowed, and the device isn't
    // the low-power tier. Otherwise the idle state is a FULL freeze (the original Path B — zero idle work).
    function idleTrafficAllowed(){
      return IDLE_TRAFFIC_FPS > 0
          && !document.hidden
          && !window.__mapPaused
          && !reduced
          && !lowPowerDevice;
    }

    // Enter the idle state from the (now-stopped) 60fps loop. Either kick the low-rate traffic ticker, or
    // — if idle traffic isn't allowed here — fully freeze (draw nothing, schedule nothing).
    function enterIdle(){
      if(!idleTrafficAllowed()){
        TRAFFIC.diagnostics.reason = 'idle-frozen';
        return;   // original Path B: everything frozen, zero idle repaint
      }
      TRAFFIC.diagnostics.reason = 'idle-traffic';
      idleLastTick = performance.now();
      if(idleTimer == null) idleTimer = setTimeout(idleTrafficTick, 1000 / IDLE_TRAFFIC_FPS);
    }

    // One low-rate idle tick (~IDLE_TRAFFIC_FPS): advance + redraw ONLY the traffic with the REAL elapsed
    // dt (so cars cover the same real-world distance per second, just in larger steps), then redraw the
    // traffic canvas. Deliberately does NO camera ease and NO map.jumpTo, so the map tiles/canvas stay
    // static and the glass isn't re-blurred by the MAP — only the cars change, ~12×/sec. Self-reschedules
    // via setTimeout (NOT a 60fps rAF — ~12 wakeups/sec is the whole point).
    function idleTrafficTick(){
      idleTimer = null;
      if(window.__mapPaused || rafId != null) return;     // paused, or the 60fps loop took over → stop idling
      if(!idleTrafficAllowed()){ TRAFFIC.diagnostics.reason = 'idle-frozen'; return; }
      const now = performance.now();
      const rawMs = Math.max(8, now - (idleLastTick || now));
      idleLastTick = now;
      // Real elapsed seconds, capped only to absorb a delayed/throttled tick without a teleport. At 12fps
      // a normal tick is ~0.083s; the same per-device speed scaling the 60fps loop uses is applied so the
      // cars don't change speed between scrolling and idle (reduced-motion never reaches here → fully frozen).
      const dt = Math.min(0.25, rawMs / 1000);
      try{
        const network = ensureTrafficNetwork();
        updateTrafficCars(network, mobileLike ? dt * .82 : dt);
        renderTraffic(network);
        TRAFFIC.idleDraws = (TRAFFIC.idleDraws | 0) + 1;
        window.__idleTrafficDraws = TRAFFIC.idleDraws;
        window.__trafficDraws = (window.__trafficDraws | 0) + 1;   // shared traffic-canvas redraw counter (all modes)
        if(!document.hidden) updateQaMetricsPanel();
      }catch(err){
        TRAFFIC.renderErrorCount++;
        TRAFFIC.diagnostics.reason = 'traffic-render-error';
        if(TRAFFIC.debug) console.warn('Idle traffic render error', err);
      }
      idleTimer = setTimeout(idleTrafficTick, 1000 / IDLE_TRAFFIC_FPS);
    }

    function startLoop(){
      // Guard so only one rAF is ever in flight (and never run while paused).
      if(rafId != null || window.__mapPaused) return;
      // Leaving the low-rate idle traffic loop → cancel its pending tick so the cars don't double-advance
      // (the 60fps loop drives them from here on; baselines reset just below so its first dt is normal).
      if(idleTimer != null){ clearTimeout(idleTimer); idleTimer = null; }
      // Hitch-free wake after an idle freeze: reset the frame-time baselines to NOW so the first resumed
      // frame computes a normal one-frame dt (not a huge accumulated catch-up across the idle gap). The
      // camera then eases from its exact current position and the traffic advances one normal step — no
      // teleport. During continuous scroll the loop never stops, so this reset never runs then and the
      // motion is identical to the original.
      const _t = performance.now();
      TRAFFIC.lastEaseTs = _t;
      TRAFFIC.lastFrame  = _t;
      TRAFFIC.lastRaf    = 0;   // drop the stale realFrameMs sample that would otherwise span the idle gap
      rafId = requestAnimationFrame(render);
    }

    // Resume hook: the host drives pause/resume via window.__mapPaused. Intercept assignments so
    // clearing the pause restarts the cancelled render loop, and setting it cancels the in-flight
    // rAF immediately. Only genuine transitions act, so redundant writes can't double-schedule.
    (function(){
      let paused = !!window.__mapPaused;
      try{
        Object.defineProperty(window, '__mapPaused', {
          configurable:true,
          get(){ return paused; },
          set(v){
            const nv = !!v;
            if(nv === paused) return;
            paused = nv;
            if(nv){
              if(rafId != null){ cancelAnimationFrame(rafId); rafId = null; }
              if(idleTimer != null){ clearTimeout(idleTimer); idleTimer = null; }
            }
            else { startLoop(); }
          }
        });
      }catch(e){ /* defineProperty unavailable: render() still self-stops on pause via its guard */ }
    })();

    // Path B WAKE hook: the host writes window.__journeyProgress (0..1) into this iframe on scroll/resize
    // (and zero times while the page is still). Intercept the assignment so every numeric write records
    // the change time (which keeps the ~250ms motion window open) and WAKES a frozen loop. startLoop() is
    // a no-op if the loop is already running, so writes during an active scroll are essentially free. When
    // the user stops scrolling the host stops writing → no wake → the loop settles and freezes.
    (function(){
      let jp = (typeof window.__journeyProgress === 'number') ? window.__journeyProgress : null;
      try{
        Object.defineProperty(window, '__journeyProgress', {
          configurable:true,
          get(){ return jp; },
          set(v){
            jp = v;
            if(typeof v === 'number'){
              lastProgressChangeTime = performance.now();
              startLoop();
            }
          }
        });
      }catch(e){ /* defineProperty unavailable: loop still wakes via resize/visibilitychange */ }
    })();

    window.addEventListener('scroll', requestTarget, {passive:true});
    window.addEventListener('resize', () => { map.resize(); resizeTrafficCanvas(); lastProgressChangeTime = performance.now(); requestTarget(); startLoop(); }, {passive:true});
    // Tab hidden → FULL freeze (cancel the idle traffic ticker too — no work behind a hidden tab). Tab
    // re-shown → wake so a repaint happens after the browser throttled/parked rAF while it was hidden.
    document.addEventListener('visibilitychange', () => {
      if(document.hidden){
        if(idleTimer != null){ clearTimeout(idleTimer); idleTimer = null; }
        if(TRAFFIC.diagnostics.reason === 'idle-traffic') TRAFFIC.diagnostics.reason = 'idle-frozen';
      }else{
        lastProgressChangeTime = performance.now();
        startLoop();
      }
    }, {passive:true});
    window.__mapState = function(){
      return {
        zoom:+camera.zoom.toFixed(2), lat:+camera.lat.toFixed(3), lng:+camera.lng.toFixed(3),
        targetZoom:+target.zoom.toFixed(2),
        drawn:TRAFFIC.stats.drawn, cars:TRAFFIC.stats.cars, lanes:TRAFFIC.stats.lanes,
        roadLayers:TRAFFIC.roadLayerIds.length, reason:TRAFFIC.diagnostics.reason,
        city:TRAFFIC.activeCityId, progress:window.__journeyProgress,
        realFrameMs:+(TRAFFIC.realFrameMs || 0).toFixed(1),
        fps:+(1000 / Math.max(1, TRAFFIC.realFrameMs || 16)).toFixed(0),
        frames:TRAFFIC.frames | 0,        // Path B: cumulative CAMERA rAF-frame count (flat ⇒ camera frozen)
        running:(rafId != null),          // Path B: is the 60fps camera rAF loop currently scheduled?
        idle:(idleTimer != null),         // Path B: is the low-rate idle traffic ticker running?
        idleFps:IDLE_TRAFFIC_FPS,         // Path B: the idle-traffic knob (0 = full freeze)
        idleDraws:TRAFFIC.idleDraws | 0,  // Path B: cumulative idle traffic redraws (climbs ~12/s when idle)
        trafficDraws:window.__trafficDraws | 0   // Path B: cumulative traffic-canvas redraws (all modes)
      };
    };
    // Lightweight read-only car-MOVEMENT health probe (for automated tests / debugging). A car counts as
    // "stuck" at speed < 0.3 m/s; a steady non-trivial `stuck` while `moving` stays high = a flow bug.
    window.__carHealth = function(){
      var net = TRAFFIC.lastVisibleNetwork;
      if(!net || !net.cars || !net.cars.length) return {cars:0, stuck:0, moving:0};
      var cars = net.cars, n = cars.length, stuck = 0, moving = 0, sumSpeed = 0, sumMove = 0;
      for(var i=0;i<n;i++){
        var s = cars[i].speed || 0; sumSpeed += s;
        if(s < 0.3) stuck++; else { moving++; sumMove += s; }
      }
      return {
        city: TRAFFIC.activeCityId, cars: n, stuck: stuck, moving: moving,
        pctStuck: +(100*stuck/n).toFixed(1),
        avgSpeed: +(sumSpeed/n).toFixed(2),
        avgMovingSpeed: +(moving ? sumMove/moving : 0).toFixed(2)
      };
    };
    updateTarget();
    startLoop();
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', start, {once:true});
  }else{
    start();
  }
})();
</script>
</body>
</html>
